@if(auth!= null){
<app-header-kanban>
  <p class="title-1">Bem vindo ao Kanban! {{ name }}</p>
</app-header-kanban>
<main
  class="pt-[69px] w-full flex items-center justify-between flex-col md:flex-row h-screen bg-white gap-2 p-2"
>
  <p-card [class]="class" header="To-do" [style]="style">
    <app-tasks
        [tasks]="tasks || []"
    />
  </p-card>
  <p-card [class]="class" header="In Progress" [style]="style"> </p-card>
  <p-card [class]="class" header="Done" [style]="style"> </p-card>
</main>
}
